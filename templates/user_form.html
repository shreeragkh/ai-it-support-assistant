{% extends "layout.html" %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h1>Create New User</h1>
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Full Name</label>
            <input type="text" name="name" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border);" placeholder="e.g. Alice Johnson" required>
        </div>
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Email Address</label>
            <input type="email" name="email" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border);" placeholder="e.g. alice@company.com" required>
        </div>
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Password</label>
            <input type="password" name="password" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border);" placeholder="••••••••" required>
        </div>
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Role</label>
            <select name="role" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border);">
                <option value="Employee">Employee</option>
                <option value="Manager">Manager</option>
                <option value="Admin">Admin</option>
            </select>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn" style="flex: 1;">Create User</button>
            <a href="/" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
