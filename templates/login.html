{% extends "layout.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto;">
    <h1>Admin Login</h1>
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Username</label>
            <input type="text" name="username" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border);" required>
        </div>
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Password</label>
            <input type="password" name="password" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border);" required>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Login</button>
    </form>
    <p style="margin-top: 1rem; font-size: 0.875rem; color: #64748b;">Hint: admin / admin</p>
</div>
{% endblock %}
