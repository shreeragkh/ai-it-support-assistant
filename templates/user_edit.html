{% extends "layout.html" %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h1>Edit User: {{ user.name }}</h1>
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Full Name</label>
            <input type="text" name="name" value="{{ user.name }}" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border);" required>
        </div>
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Email Address</label>
            <input type="email" name="email" value="{{ user.email }}" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border);" required>
        </div>
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">New Password (Optional)</label>
            <input type="password" name="password" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border);" placeholder="Leave blank to keep current">
        </div>
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Role</label>
            <select name="role" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border);">
                <option value="Employee" {% if user.role == 'Employee' %}selected{% endif %}>Employee</option>
                <option value="Manager" {% if user.role == 'Manager' %}selected{% endif %}>Manager</option>
                <option value="Admin" {% if user.role == 'Admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn" style="flex: 1;">Update User</button>
            <a href="/" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
